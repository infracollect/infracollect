[tools]
hk = "1.42.0"
pkl = "0.31.1"
golangci-lint = "v2.8.0"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
prettier = "3.8.2"
rumdl = "0.1.70"
"go:golang.org/x/tools/cmd/goimports" = "latest"
actionlint = "1.7.12"

[tasks.pre-commit]
run = "hk run pre-commit"

[tasks]
build = "go build ./cmd/infracollect"
test = "go test ./..."
lint = "golangci-lint run"
vuln = "govulncheck ./..."

[tasks.gen-docs]
run = "go run scripts/gen-docs.go"
sources = [
  "docs/registry.yaml",
  "scripts/gen-docs.go",
  "scripts/gendocs/**/*.go",
  "internal/integrations/**/*.go",
  "internal/engine/steps/register.go",
  "internal/runner/template.go",
  "internal/runner/output.go",
]
outputs = ["website/src/data/schemas/*.json"]

[tasks.gen-cli-docs]
run = "go run scripts/gen-cli-docs.go"
sources = ["cmd/infracollect/*.go", "scripts/gen-cli-docs.go"]
outputs = ["website/src/content/docs/reference/cli/*.md"]

[tasks.docs]
run = "npm run dev -- --open"
dir = "website"
depends = ["gen-docs", "gen-cli-docs"]
